        };

        const renderCalendarDays = (year, month, data) => {
            const grid = document.getElementById('calendar-days-grid');
            if (!grid) return;
            
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            
            let firstDayVal = new Date(year, month, 1).getDay();
            let firstDayOffset = (firstDayVal + 6) % 7;
            
            const totalDaysInMonth = new Date(year, month + 1, 0).getDate();
            const totalDaysInPrevMonth = new Date(year, month, 0).getDate();
            
            let html = '';
            
            for (let i = firstDayOffset - 1; i >= 0; i--) {
                const dayNum = totalDaysInPrevMonth - i;
                const prevMonth = month - 1 < 0 ? 11 : month - 1;
                const prevYear = month - 1 < 0 ? year - 1 : year;
                const dateStr = formatDateString(prevYear, prevMonth, dayNum);
                html += renderDayBoxHtml(dayNum, dateStr, todayStr, true, data);
            }
            
            for (let dayNum = 1; dayNum <= totalDaysInMonth; dayNum++) {
                const dateStr = formatDateString(year, month, dayNum);
                html += renderDayBoxHtml(dayNum, dateStr, todayStr, false, data);
            }
            
            const remainingCells = 42 - (firstDayOffset + totalDaysInMonth);
            for (let dayNum = 1; dayNum <= remainingCells; dayNum++) {
                const nextMonth = month + 1 > 11 ? 0 : month + 1;
                const nextYear = month + 1 > 11 ? year + 1 : year;
                const dateStr = formatDateString(nextYear, nextMonth, dayNum);
                html += renderDayBoxHtml(dayNum, dateStr, todayStr, true, data);
            }
            
            grid.innerHTML = html;
        };

        const formatDateString = (year, month, day) => {
            const m = String(month + 1).padStart(2, '0');
            const d = String(day).padStart(2, '0');
            return `${year}-${m}-${d}`;
        };

        const renderDayBoxHtml = (dayNum, dateStr, todayStr, isOtherMonth, data) => {
            const isToday = dateStr === todayStr;
            const otherMonthClass = isOtherMonth ? 'other-month' : '';
            const todayClass = isToday ? 'today' : '';
            
            const dayTasks = [];
            data.columns.forEach(col => {
                col.tasks.forEach(task => {
                    if (task.date === dateStr) {
                        dayTasks.push({ ...task, columnId: col.id, columnTitle: col.title });
                    }
                });
            });
            
            const priorityLabels = { low: 'Baja', medium: 'Media', high: 'Alta' };
            
            let tasksHtml = '';
            dayTasks.forEach(task => {
                const isCompleted = task.columnId === 'col-completed';
                const completedClass = isCompleted ? 'completed' : '';
                tasksHtml += `
                    <div class="calendar-task-pill ${task.priority} ${completedClass}" 
                         data-task-id="${task.id}" 
                         data-col-id="${task.columnId}" 
                         title="${escapeHTML(task.title)} (${priorityLabels[task.priority]})">
                        ${isCompleted ? '✓ ' : ''}${escapeHTML(task.title)}
                    </div>
                `;
            });
            
            return `
                <div class="calendar-day-box ${otherMonthClass} ${todayClass}" data-date="${dateStr}">
                    <div class="day-header">
                        <span class="day-number">${dayNum}</span>
                        <button class="calendar-day-add-btn" data-date="${dateStr}" title="Añadir tarea para este día">+</button>
                    </div>
                    <div class="calendar-tasks-container">
                        ${tasksHtml}
                    </div>
                </div>
            `;
        };

        const bindCalendarInteractions = () => {
            const pills = document.querySelectorAll('.calendar-task-pill');
            pills.forEach(pill => {
                pill.onclick = (e) => {
                    e.stopPropagation();
                    const taskId = pill.getAttribute('data-task-id');
                    const colId = pill.getAttribute('data-col-id');
                    
                    if (typeof openTaskModal === 'function') {
                        if (!boardState.data) {
                            boardState.data = getBoardData();
                        }
                        openTaskModal(taskId, colId);
                        
                        const form = document.getElementById('task-form');
                        
                        const refreshTimeline = () => {
                            setTimeout(() => {
                                if (state.currentView === 'timeline') {
                                    renderTimeline(DOM.appContent);
                                }
                                form.removeEventListener('submit', refreshTimeline);
                            }, 50);
                        };
                        form.addEventListener('submit', refreshTimeline);
                    }
                };
            });
            
            const addBtns = document.querySelectorAll('.calendar-day-add-btn');
            addBtns.forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const dateStr = btn.getAttribute('data-date');
                    const data = getBoardData();
                    const firstColId = data.columns.length > 0 ? data.columns[0].id : 'col-todo';
                    
                    if (typeof openTaskModal === 'function') {
                        if (!boardState.data) {
                            boardState.data = data;
                        }
                        openTaskModal(null, firstColId);
                        
                        const dateInput = document.getElementById('task-date-input');
                        if (dateInput) dateInput.value = dateStr;
                        
                        const form = document.getElementById('task-form');
                        const refreshTimeline = () => {
                            setTimeout(() => {
                                if (state.currentView === 'timeline') {
                                    renderTimeline(DOM.appContent);
                                }
                                form.removeEventListener('submit', refreshTimeline);
                            }, 50);
                        };
                        form.addEventListener('submit', refreshTimeline);
                    }
                };
            });
        };

        const renderGanttView = (year, month, data) => {
            const headerRow = document.getElementById('gantt-header-row');
            const rowsContainer = document.getElementById('gantt-rows-container');
            if (!headerRow || !rowsContainer) return;
            
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            
            const totalDaysInMonth = new Date(year, month + 1, 0).getDate();
            const dayNames = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
            
            let headerHtml = `<div class="gantt-stage-header-cell">Estado / Flujo</div>`;
            for (let dayNum = 1; dayNum <= totalDaysInMonth; dayNum++) {
                const dateStr = formatDateString(year, month, dayNum);
                const dayOfWeek = new Date(year, month, dayNum).getDay();
                const dayName = dayNames[dayOfWeek];
                const isToday = dateStr === todayStr;
                const todayClass = isToday ? 'today' : '';
                
                headerHtml += `
                    <div class="gantt-day-header-cell ${todayClass}">
                        <span class="day-number">${dayNum}</span>
                        <span class="day-name">${dayName}</span>
                    </div>
                `;
            }
            headerRow.innerHTML = headerHtml;
            
            let rowsHtml = '';
            data.columns.forEach(col => {
                rowsHtml += `
                    <div class="gantt-row">
                        <div class="gantt-stage-label">
                            <span>${escapeHTML(col.title)}</span>
                            <span class="stage-count-badge">${col.tasks.length} tareas</span>
                        </div>
                `;
                
                for (let dayNum = 1; dayNum <= totalDaysInMonth; dayNum++) {
                    const dateStr = formatDateString(year, month, dayNum);
                    const isToday = dateStr === todayStr;
                    const todayClass = isToday ? 'today' : '';
                    
                    const cellTasks = col.tasks.filter(t => t.date === dateStr);
                    
                    let tasksHtml = '';
                    cellTasks.forEach(task => {
                        const isCompleted = col.id === 'col-completed';
                        const completedClass = isCompleted ? 'completed' : '';
                        tasksHtml += `
                            <div class="gantt-task-card ${task.priority} ${completedClass}" 
                                 data-task-id="${task.id}" 
                                 data-col-id="${col.id}"
                                 title="${escapeHTML(task.title)}">
                                <div style="font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHTML(task.title)}</div>
                            </div>
                        `;
                    });
                    
                    const addBtnHtml = `
                        <button class="gantt-cell-add-btn" data-date="${dateStr}" data-col-id="${col.id}" title="Añadir tarea">+</button>
                    `;
                    
                    rowsHtml += `
                        <div class="gantt-cell ${todayClass}">
                            ${tasksHtml || addBtnHtml}
                        </div>
                    `;
                }
                
                rowsHtml += `</div>`;
            });
            
            rowsContainer.innerHTML = rowsHtml;
        };

        const bindGanttInteractions = () => {
            const cards = document.querySelectorAll('.gantt-task-card');
            cards.forEach(card => {
                card.onclick = (e) => {
                    e.stopPropagation();
                    const taskId = card.getAttribute('data-task-id');
                    const colId = card.getAttribute('data-col-id');
                    
                    if (typeof openTaskModal === 'function') {
                        if (!boardState.data) {
                            boardState.data = getBoardData();
                        }
                        openTaskModal(taskId, colId);
                        
                        const form = document.getElementById('task-form');
                        const refreshTimeline = () => {
                            setTimeout(() => {
                                if (state.currentView === 'timeline') {
                                    renderTimeline(DOM.appContent);
                                }
                                form.removeEventListener('submit', refreshTimeline);
                            }, 50);
                        };
                        form.addEventListener('submit', refreshTimeline);
                    }
                };
            });
            
            const addBtns = document.querySelectorAll('.gantt-cell-add-btn');
            addBtns.forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const dateStr = btn.getAttribute('data-date');
                    const colId = btn.getAttribute('data-col-id');
                    
                    if (typeof openTaskModal === 'function') {
                        if (!boardState.data) {
                            boardState.data = getBoardData();
                        }
                        openTaskModal(null, colId);
                        
                        const dateInput = document.getElementById('task-date-input');
                        if (dateInput) dateInput.value = dateStr;
                        
                        const form = document.getElementById('task-form');
                        const refreshTimeline = () => {
                            setTimeout(() => {
                                if (state.currentView === 'timeline') {
                                    renderTimeline(DOM.appContent);
                                }
                                form.removeEventListener('submit', refreshTimeline);
                            }, 50);
                        };
                        form.addEventListener('submit', refreshTimeline);
                    }
                };
            });
        };

        // --- 4. MAIN ORCHESTRATOR ENTRYPOINT (js/app.js) ---
        const state = {
            currentView: 'dashboard',
            theme: 'dark'
        };

        const DOM = {
            appContent: document.getElementById('app-content'),
            navDashboard: document.getElementById('nav-dashboard'),
            navKanban: document.getElementById('nav-kanban'),
            navTimeline: document.getElementById('nav-timeline'),
            themeToggle: document.getElementById('theme-toggle'),
            mobileToggle: document.getElementById('mobile-toggle'),
            sidebar: document.getElementById('sidebar'),
            currentDate: document.getElementById('current-date'),
            searchInput: document.getElementById('search-input'),
            searchContainer: document.getElementById('global-search-container')
        };

        const initTheme = () => {
            const savedTheme = localStorage.getItem('veloce_theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            state.theme = savedTheme || (prefersDark ? 'dark' : 'light');
            applyTheme();
            DOM.themeToggle.addEventListener('click', () => {
                state.theme = state.theme === 'dark' ? 'light' : 'dark';
                applyTheme();
            });
        };

        const applyTheme = () => {
            const textSpan = DOM.themeToggle.querySelector('.theme-toggle-text');
            if (state.theme === 'dark') {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                textSpan.textContent = 'Modo Claro';
                localStorage.setItem('veloce_theme', 'dark');
            } else {
                document.body.classList.remove('dark-theme');
                document.body.classList.add('light-theme');
                textSpan.textContent = 'Modo Oscuro';
                localStorage.setItem('veloce_theme', 'light');
            }
        };

        const initDateTime = () => {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const today = new Date();
            let dateStr = today.toLocaleDateString('es-ES', options);
            dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
            DOM.currentDate.textContent = dateStr;
        };

        const initNavigation = () => {
            const buttons = [DOM.navDashboard, DOM.navKanban, DOM.navTimeline];
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const button = e.currentTarget;
                    const targetView = button.getAttribute('data-view');
                    if (targetView === state.currentView) return;
                    buttons.forEach(b => b.classList.remove('active'));
                    button.classList.add('active');
                    switchView(targetView);
                    DOM.sidebar.classList.remove('mobile-open');
                });
            });
        };

        var switchView = (viewName) => {
            try {
                state.currentView = viewName;
                DOM.searchInput.value = '';
                DOM.appContent.style.animation = 'none';
                void DOM.appContent.offsetWidth; 
                DOM.appContent.style.animation = 'fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards';
                
                if (viewName === 'dashboard') {
                    DOM.searchContainer.classList.add('hidden');
                    renderDashboard(DOM.appContent);
                } else if (viewName === 'kanban') {
                    DOM.searchContainer.classList.remove('hidden');
                    renderKanban(DOM.appContent);
                } else if (viewName === 'timeline') {
                    DOM.searchContainer.classList.add('hidden');
                    renderTimeline(DOM.appContent);
                }
            } catch (err) {
                console.error("Fallo en switchView:", err);
                if (window.showAppError) {
                    window.showAppError(err.message, err.stack || err.toString());
                }
            }
        };

        const initMobileMenu = () => {
            DOM.mobileToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                DOM.sidebar.classList.toggle('mobile-open');
            });
            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 768 && 
                    DOM.sidebar.classList.contains('mobile-open') && 
                    !DOM.sidebar.contains(e.target) && 
                    !DOM.mobileToggle.contains(e.target)) {
                    DOM.sidebar.classList.remove('mobile-open');
                }
            });
        };

        const initSearch = () => {
            DOM.searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                if (state.currentView === 'kanban') {
                    handleKanbanSearch(query);
                }
            });
        };

        const init = () => {
            try {
                initModalCache();
                initTheme();
                initDateTime();
                initNavigation();
                initMobileMenu();
                initSearch();
                switchView(state.currentView);
            } catch (err) {
                console.error("Fallo en inicialización de Veloce Tracker:", err);
                if (window.showAppError) {
                    window.showAppError(err.message, err.stack || err.toString());
                }
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
