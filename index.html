            document.getElementById('cal-next').onclick = () => {
                calendarState.currentMonth++;
                if (calendarState.currentMonth > 11) { calendarState.currentMonth = 0; calendarState.currentYear++; }
                renderCalendar(container);
            };
            document.getElementById('cal-today').onclick = () => {
                calendarState.currentYear = new Date().getFullYear();
                calendarState.currentMonth = new Date().getMonth();
                renderCalendar(container);
            };
            document.getElementById('cal-add-event').onclick = () => openEventModal(null, null, container);

            document.getElementById('calendar-days-grid').addEventListener('click', (e) => {
                const pill   = e.target.closest('.cal-event-pill');
                const addBtn = e.target.closest('.calendar-day-add-btn');
                if (pill) {
                    const evtId = pill.getAttribute('data-evt-id');
                    const d = getBoardData();
                    const evt = (d.events || []).find(ev => ev.id === evtId);
                    if (evt) openEventModal(evt, null, container);
                } else if (addBtn) {
                    openEventModal(null, addBtn.getAttribute('data-date'), container);
                }
            });
        };

        const renderCalendarDays = (year, month, data, holidays) => {
            const grid = document.getElementById('calendar-days-grid');
            if (!grid) return;
            const todayStr = new Date().toISOString().split('T')[0];
            const firstDayOffset = (new Date(year, month, 1).getDay() + 6) % 7;
            const totalDays      = new Date(year, month + 1, 0).getDate();
            const totalPrevDays  = new Date(year, month, 0).getDate();
            const events = data.events || [];

            let html = '';
            for (let i = firstDayOffset - 1; i >= 0; i--) {
                const d  = totalPrevDays - i;
                const pm = month - 1 < 0 ? 11 : month - 1;
                const py = month - 1 < 0 ? year - 1 : year;
                html += buildDayCell(d, fmtDs(py, pm, d), todayStr, true, events, holidays);
            }
            for (let d = 1; d <= totalDays; d++) {
                html += buildDayCell(d, fmtDs(year, month, d), todayStr, false, events, holidays);
            }
            const remaining = 42 - (firstDayOffset + totalDays);
            for (let d = 1; d <= remaining; d++) {
                const nm = month + 1 > 11 ? 0 : month + 1;
                const ny = month + 1 > 11 ? year + 1 : year;
                html += buildDayCell(d, fmtDs(ny, nm, d), todayStr, true, events, holidays);
            }
            grid.innerHTML = html;
        };

        const buildDayCell = (dayNum, dateStr, todayStr, isOther, events, holidays) => {
            const isToday   = dateStr === todayStr;
            const holiday   = holidays[dateStr];
            const dayEvents = events.filter(ev => ev.date === dateStr);

            let eventsHtml = '';
            if (holiday) {
                eventsHtml += `<div class="cal-holiday-pill" title="${escapeHTML(holiday)}">${escapeHTML(holiday)}</div>`;
            }
            dayEvents.forEach(ev => {
                const timeStr = ev.time ? `${ev.time} ` : '';
                eventsHtml += `<div class="cal-event-pill" data-evt-id="${ev.id}" title="${escapeHTML(ev.title)}">${timeStr}${escapeHTML(ev.title)}</div>`;
            });

            return `
                <div class="calendar-day-box ${isOther ? 'other-month' : ''} ${isToday ? 'today' : ''}" data-date="${dateStr}">
                    <div class="day-header">
                        <span class="day-number">${dayNum}</span>
                        <button class="calendar-day-add-btn" data-date="${dateStr}" title="Añadir evento">+</button>
                    </div>
                    <div class="calendar-tasks-container">${eventsHtml}</div>
                </div>
            `;
        };

        const openEventModal = (existing = null, preDate = null, calContainer = null) => {
            document.getElementById('event-modal-overlay')?.remove();
            const todayStr = new Date().toISOString().split('T')[0];
            const isEdit   = existing !== null;

            const getGCalUrl = (ev) => {
                if (!ev || !ev.date) return '#';
                const dt  = ev.date.replace(/-/g, '');
                const tm  = ev.time ? ev.time.replace(':', '') + '00' : '';
                const start = ev.time ? `${dt}T${tm}` : dt;
                const end   = ev.time ? `${dt}T${tm}` : dt;
                return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(ev.title || '')}&dates=${start}/${end}&details=${encodeURIComponent(ev.notes || '')}&location=${encodeURIComponent(ev.address || '')}`;
            };

            const downloadIcs = (ev) => {
                const dt   = ev.date.replace(/-/g, '');
                const tm   = ev.time ? ev.time.replace(':', '') + '00' : '';
                const dtStart = ev.time ? `DTSTART:${dt}T${tm}` : `DTSTART;VALUE=DATE:${dt}`;
                const dtEnd   = ev.time ? `DTEND:${dt}T${tm}`   : `DTEND;VALUE=DATE:${dt}`;
                const ics = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nUID:${ev.id}@ratoncitos\n${dtStart}\n${dtEnd}\nSUMMARY:${ev.title}\nDESCRIPTION:${(ev.notes||'').replace(/\n/g,'\\n')}\nLOCATION:${ev.address||''}\nEND:VEVENT\nEND:VCALENDAR`;
                const blob = new Blob([ics], { type: 'text/calendar' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${(ev.title||'evento').replace(/\s+/g,'_')}.ics`;
                a.click();
            };

            const overlay = document.createElement('div');
            overlay.className = 'expense-modal-overlay show';
            overlay.id = 'event-modal-overlay';
            overlay.innerHTML = `
                <div class="expense-modal-card" style="max-width:520px;">
                    <div class="expense-modal-header">
                        <h3>${isEdit ? 'Editar Evento' : 'Nuevo Evento'}</h3>
                        <button class="expense-modal-close" id="event-modal-close" aria-label="Cerrar">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
                        </button>
                    </div>
                    <form id="event-form" class="expense-form">
                        <div class="form-group">
                            <label for="evt-title">Nombre del evento <span style="color:var(--priority-high)">*</span></label>
                            <input type="text" id="evt-title" placeholder="Ej: Cena con los amigos" value="${escapeHTML(existing?.title || '')}" required maxlength="80">
                        </div>
                        <div class="form-row-2">
                            <div class="form-group">
                                <label for="evt-date">Fecha <span style="color:var(--priority-high)">*</span></label>
                                <input type="date" id="evt-date" value="${existing?.date || preDate || todayStr}" required>
                            </div>
                            <div class="form-group">
                                <label for="evt-time">Hora <span style="font-weight:400;opacity:0.6;">(opcional, ej: 19:30)</span></label>
                                <input type="text" id="evt-time" placeholder="HH:MM" maxlength="5" inputmode="numeric" value="${existing?.time || ''}" autocomplete="off" style="letter-spacing:0.08em;font-size:1rem;">
                            </div>
                        </div>
                        <div class="form-group" style="position: relative;">
                            <label for="evt-address">Dirección / Lugar</label>
                            <input type="text" id="evt-address" placeholder="Ej: Av. Principal 123, Santiago" value="${escapeHTML(existing?.address || '')}" autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label for="evt-notes">Notas</label>
                            <textarea id="evt-notes" rows="2" placeholder="Detalles adicionales..." maxlength="300">${escapeHTML(existing?.notes || '')}</textarea>
                        </div>
                        ${isEdit ? `
                        <div style="display:flex;gap:10px;margin-bottom:10px;">
                            <a id="evt-gcal" href="${getGCalUrl(existing)}" target="_blank" class="btn btn-secondary" style="flex:1;justify-content:center;font-size:0.8rem;padding:8px;text-decoration:none;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                                Google Calendar
                            </a>
                            <button type="button" id="evt-ical" class="btn btn-secondary" style="flex:1;font-size:0.8rem;padding:8px;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                                Apple / iCal
                            </button>
                        </div>
                        <button type="button" id="evt-delete" class="btn btn-secondary" style="width:100%;margin-bottom:8px;color:var(--priority-high);border-color:var(--priority-high);">Eliminar evento</button>
                        ` : ''}
                        <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;font-weight:700;font-size:1rem;">
                            ${isEdit ? 'Guardar Cambios' : 'Crear Evento'}
                        </button>
                    </form>
                </div>
            `;

            document.body.appendChild(overlay);

            const closeOverlay = () => { 
                overlay.classList.remove('show'); 
                setTimeout(() => overlay.remove(), 300); 
            };
            overlay.querySelector('#event-modal-close').addEventListener('click', closeOverlay);
            overlay.addEventListener('click', e => { if (e.target === overlay) closeOverlay(); });

            // Auto-format time HH:MM as the user types
            const timeInput = overlay.querySelector('#evt-time');
            timeInput.addEventListener('input', () => {
                let v = timeInput.value.replace(/[^\d]/g, '').slice(0, 4);
                if (v.length >= 3) v = v.slice(0, 2) + ':' + v.slice(2);
                timeInput.value = v;
            });
            timeInput.addEventListener('blur', () => {
                const v = timeInput.value;
                const m = v.match(/^(\d{1,2}):?(\d{0,2})$/);
                if (!m) { timeInput.value = ''; return; }
                const h = parseInt(m[1], 10), mn = parseInt(m[2] || '0', 10);
                if (h > 23 || mn > 59) { timeInput.value = ''; return; }
                timeInput.value = `${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;
            });

            if (isEdit) {
                overlay.querySelector('#evt-ical')?.addEventListener('click', () => downloadIcs(existing));
                overlay.querySelector('#evt-delete')?.addEventListener('click', () => {
                    if (confirm(`¿Eliminar "${existing.title}"?`)) {
                        const d = getBoardData();
                        d.events = (d.events || []).filter(ev => ev.id !== existing.id);
                        saveBoardData(d);
                        addActivityLog(`Evento eliminado: ${existing.title}`, 'Calendario', 'low');
                        closeOverlay();
                        if (calContainer) renderCalendar(calContainer);
                    }
                });
            }

            overlay.querySelector('#event-form').addEventListener('submit', e => {
                e.preventDefault();
                const title   = overlay.querySelector('#evt-title').value.trim();
                const date    = overlay.querySelector('#evt-date').value;
                const time    = overlay.querySelector('#evt-time').value;
                const address = overlay.querySelector('#evt-address').value.trim();
                const notes   = overlay.querySelector('#evt-notes').value.trim();
                if (!title || !date) return;

                const d = getBoardData();
                if (!d.events) d.events = [];
                if (isEdit) {
                    const idx = d.events.findIndex(ev => ev.id === existing.id);
                    if (idx >= 0) d.events[idx] = { ...d.events[idx], title, date, time, address, notes };
                    addActivityLog(`Evento editado: ${title}`, 'Calendario', 'low');
                } else {
                    d.events.push({ id: 'evt-' + generateId(), title, date, time, address, notes });
                    addActivityLog(`Evento creado: ${title}`, 'Calendario', 'low');
                }
                saveBoardData(d);
                closeOverlay();
                if (calContainer) renderCalendar(calContainer);
            });
        };


        // --- 3.5 EXPENSES MODULE ---
        const EXPENSE_CATEGORIES = ['Supermercado', 'Casa', 'Mascotas', 'Finanzas', 'Ocio', 'Transporte', 'Salud', 'Otro'];
        
        const getCategoryColor = (cat) => {
            const map = {
                'Casa': '#a855f7', 'Supermercado': '#22c55e', 'Mascotas': '#f59e0b',
                'Finanzas': '#3b82f6', 'Trabajo': '#6366f1', 'Ocio': '#ec4899',
                'Transporte': '#14b8a6', 'Salud': '#ef4444', 'Otro': '#94a3b8'
            };
            return map[cat] || '#94a3b8';
        };

        const expensesState = { selectedMonth: null }; // 'YYYY-MM' or null = all

        var renderExpenses = (container) => {
            const data = getBoardData();
            // Remove legacy synthetic settlement entries from old mechanism
            if (data.expenses) {
                const cleaned = data.expenses.filter(e =>
                    !(e.concept === 'Liquidación de deuda' && !e.settled && e.category === 'Finanzas')
                );
                if (cleaned.length !== data.expenses.length) {
                    data.expenses = cleaned;
                    saveBoardData(data);
                }
            }
            const expenses = data.expenses || [];

            // Safe date formatter helper (avoids Invalid Date)
            const safeFmtDate = (dateStr) => {
                if (!dateStr) return '—';
                const parts = String(dateStr).split('-');
                if (parts.length !== 3) return dateStr;
                try {
                    return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]))
                        .toLocaleDateString('es-CL', { day: 'numeric', month: 'short' });
                } catch { return dateStr; }
            };

            // Only unsettled expenses count toward balance
            const activeExpenses  = expenses.filter(e => !e.settled);
            const settledExpenses = expenses.filter(e =>  e.settled);

            const totals = { 'oxi@oxiflow.com': 0, 'javi@oxiflow.com': 0 };
            let grandTotal = 0;
            expenses.forEach(exp => {
                const amt = Math.round(parseFloat(exp.amount) || 0);
                if (totals[exp.paidBy] !== undefined) totals[exp.paidBy] += amt;
                grandTotal += amt;
            });

            const activeTotals = { 'oxi@oxiflow.com': 0, 'javi@oxiflow.com': 0 };
            activeExpenses.forEach(exp => {
                const amt = Math.round(parseFloat(exp.amount) || 0);
                if (activeTotals[exp.paidBy] !== undefined) activeTotals[exp.paidBy] += amt;
            });

            const oxiTotal   = totals['oxi@oxiflow.com'];
            const javiTotal  = totals['javi@oxiflow.com'];
            // Balance only from active (unsettled) expenses
            const activeOxi  = activeTotals['oxi@oxiflow.com'];
            const activeJavi = activeTotals['javi@oxiflow.com'];
            const oxiBalance = activeOxi - activeJavi;   // > 0 = Oxi paid more (Javi owes)
            const debtAmount = Math.round(Math.abs(oxiBalance) / 2);

            const hasSettled = settledExpenses.length > 0;
            let settlementHTML = '';
            if (debtAmount < 1) {
                const settledNote = hasSettled
                    ? `<span style="font-size:0.75rem;opacity:0.7;margin-left:8px;">${settledExpenses.length} gasto${settledExpenses.length>1?'s':''} liquidado${settledExpenses.length>1?'s':''}</span>`
                    : '';
                settlementHTML = `<div class="settlement-card settled">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    <span>¡No hay deuda pendiente!${settledNote}</span>
                </div>`;
            } else {
                const debtor  = oxiBalance > 0 ? 'Javi' : 'Oxi';
                const debtorEmail = oxiBalance > 0 ? 'javi@oxiflow.com' : 'oxi@oxiflow.com';
                const creditor = oxiBalance > 0 ? 'Oxi'  : 'Javi';
                settlementHTML = `<div class="settlement-card owes">
                    <div class="settlement-actions">
                        <div style="display:flex;align-items:center;gap:10px;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                            <span><strong>${debtor}</strong> le debe <strong>${formatCLP(debtAmount)}</strong> a <strong>${creditor}</strong></span>
                        </div>
                        <button class="btn-saldado" id="btn-saldar-deuda" data-debtor="${debtorEmail}" data-debtor-name="${debtor}" data-creditor-name="${creditor}" data-amount="${debtAmount}">
                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                            Marcar como saldado
                        </button>
                    </div>
                </div>`;
            }

            const expenseRows = expenses.map((exp, idx) => {
                const isOxi = exp.paidBy === 'oxi@oxiflow.com';
                const paidByName = isOxi ? 'Oxi' : 'Javi';
                const avatarClass = isOxi ? 'avatar-oxi' : 'avatar-javi';
                const initial = isOxi ? 'O' : 'J';
                const catColor = getCategoryColor(exp.category);
                const dateStr = safeFmtDate(exp.date);
                return `
                    <tr class="expense-row" style="animation: fadeIn 0.3s ease ${idx * 0.04}s both; ${exp.settled ? 'opacity:0.45;' : ''}">
                        <td class="expense-concept">${escapeHTML(exp.concept || 'Sin concepto')}</td>
                        <td class="expense-amount">${formatCLP(exp.amount)}</td>
                        <td><div class="expense-paid-by"><div class="expense-avatar ${avatarClass}">${initial}</div><span>${paidByName}</span></div></td>
                        <td>${dateStr}</td>
                        <td><span class="expense-cat-tag" style="--cat-color:${catColor};">${escapeHTML(exp.category || 'Otro')}</span></td>
                        <td>
                            <div class="expense-row-actions">
                                <button class="expense-edit-btn" data-idx="${idx}" title="Editar">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                                </button>
                                <button class="expense-delete-btn" data-idx="${idx}" title="Eliminar">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                                </button>
                            </div>
                        </td>
                    </tr>`;
            }).join('');


            // Build month filter options from all expenses
            const monthSet = [...new Set(expenses.map(e => (e.date || '').slice(0,7)).filter(Boolean))].sort().reverse();
            const mnLabels = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
            const fmtMonth = (ym) => { const [y,m] = ym.split('-'); return `${mnLabels[parseInt(m)-1]} ${y}`; };

            // Default: current month if available, else 'all'
            if (expensesState.selectedMonth === null) {
                const curMo = new Date().toISOString().slice(0,7);
                expensesState.selectedMonth = monthSet.includes(curMo) ? curMo : (monthSet[0] || 'all');
            }

            const monthOptions = `<option value="all" ${expensesState.selectedMonth==='all'?'selected':''}>Todos los meses</option>`
                + monthSet.map(ym => `<option value="${ym}" ${expensesState.selectedMonth===ym?'selected':''}>${fmtMonth(ym)}</option>`).join('');

            // Filter for table
            const filtered = expensesState.selectedMonth === 'all'
                ? expenses
                : expenses.filter(e => (e.date || '').startsWith(expensesState.selectedMonth));

            // Filtered stats for cartola header
            const filtTotal = filtered.reduce((s,e)=>s+Math.round(parseFloat(e.amount)||0),0);
            const filtOxi   = filtered.filter(e=>e.paidBy==='oxi@oxiflow.com').reduce((s,e)=>s+Math.round(parseFloat(e.amount)||0),0);
            const filtJavi  = filtered.filter(e=>e.paidBy==='javi@oxiflow.com').reduce((s,e)=>s+Math.round(parseFloat(e.amount)||0),0);

            // Filtered expense rows
            const filtExpenseRows = filtered.map((exp, idx) => {
                const realIdx = expenses.indexOf(exp);
                const isOxi = exp.paidBy === 'oxi@oxiflow.com';
                const paidByName = isOxi ? 'Oxi' : 'Javi';
                const avatarClass = isOxi ? 'avatar-oxi' : 'avatar-javi';
                const initial = isOxi ? 'O' : 'J';
                const catColor = getCategoryColor(exp.category);
                const dateStr = safeFmtDate(exp.date);
                return `
                    <tr class="expense-row" style="animation: fadeIn 0.3s ease ${idx * 0.04}s both; ${exp.settled ? 'opacity:0.4;' : ''}">
                        <td class="expense-concept">${escapeHTML(exp.concept || 'Sin concepto')}${exp.settled ? ' <span style="font-size:0.65rem;background:rgba(16,185,129,0.12);color:#10b981;border-radius:4px;padding:1px 5px;vertical-align:middle;">Saldado</span>' : ''}</td>
                        <td class="expense-amount">${formatCLP(exp.amount)}</td>
                        <td><div class="expense-paid-by"><div class="expense-avatar ${avatarClass}">${initial}</div><span>${paidByName}</span></div></td>
                        <td>${dateStr}</td>
                        <td><span class="expense-cat-tag" style="--cat-color:${catColor};">${escapeHTML(exp.category || 'Otro')}</span></td>
                        <td>
                            <div class="expense-row-actions">
                                ${!exp.settled ? `
                                <button class="expense-edit-btn" data-idx="${realIdx}" title="Editar">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                                </button>` : ''}
                                <button class="expense-delete-btn" data-idx="${realIdx}" title="Eliminar">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                                </button>
                            </div>
                        </td>
                    </tr>`;
            }).join('');

            // Settlements history
            const settlements = data.settlements || [];
            const settlementsHTML = settlements.length === 0 ? '' : `
                <div class="glass-panel" style="margin-top:20px;padding:20px 24px;border-radius:var(--border-radius-lg);box-shadow:var(--shadow-card);">
                    <h3 style="font-size:0.9rem;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;color:var(--text-secondary);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        Historial de Liquidaciones
                    </h3>
                    ${settlements.slice().reverse().map(s => {
                        const d = parseInt((s.date||'').split('-')[2]||'0',10);
                        const [sy,sm] = (s.date||'').split('-');
                        const mo = mnLabels[parseInt(sm)-1]||'';
                        return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border-color);font-size:0.83rem;">
                            <span style="font-weight:700;color:#10b981;white-space:nowrap;">${d} ${mo} ${sy}</span>
                            <span style="flex:1;">${escapeHTML(s.debtor)} pagó <strong>${formatCLP(s.amount)}</strong> a ${escapeHTML(s.creditor)}</span>
                            <span style="font-size:0.72rem;color:var(--text-secondary);">${s.expenseCount} gasto${s.expenseCount!==1?'s':''} liquidado${s.expenseCount!==1?'s':''}</span>
                        </div>`;
                    }).join('')}
                </div>
            `;

            container.innerHTML = `
                <div class="expenses-container">
                    <div class="indicators-mini-panel" id="economic-indicators-panel">
                        <span class="indicators-loading">Cargando indicadores económicos…</span>
                    </div>
                    <div class="expenses-header">
                        <div>
                            <h1 style="font-size:1.8rem;font-weight:800;margin-bottom:4px;">Control de Gastos</h1>
                            <p style="color:var(--text-secondary);font-size:0.95rem;">Gestión y liquidación de gastos compartidos en el hogar.</p>
                        </div>
                        <button class="btn btn-primary" id="add-expense-btn" style="padding:10px 20px;border-radius:var(--border-radius-md);font-weight:600;display:flex;align-items:center;gap:8px;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
                            Añadir Gasto
                        </button>
                    </div>
                    <div class="expenses-balance-grid">
                        <div class="balance-card balance-oxi">
                            <div class="balance-avatar avatar-oxi">O</div>
                            <div class="balance-info"><span class="balance-name">Oxi</span><span class="balance-amount">${formatCLP(oxiTotal)}</span></div>
                            <div class="balance-label">Aportado total</div>
                        </div>
                        <div class="balance-card balance-javi">
                            <div class="balance-avatar avatar-javi">J</div>
                            <div class="balance-info"><span class="balance-name">Javi</span><span class="balance-amount">${formatCLP(javiTotal)}</span></div>
                            <div class="balance-label">Aportado total</div>
                        </div>
                        <div class="balance-card balance-total">
                            <div class="balance-icon"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg></div>
                            <div class="balance-info"><span class="balance-name">Total Gastos</span><span class="balance-amount">${formatCLP(grandTotal)}</span></div>
                            <div class="balance-label">Compartido</div>
                        </div>
                    </div>
                    ${settlementHTML}

                    <!-- Cartola mensual -->
                    <div style="display:flex;align-items:center;gap:12px;margin:20px 0 12px;flex-wrap:wrap;">
                        <label style="font-size:0.82rem;font-weight:700;color:var(--text-secondary);">Ver:</label>
                        <select id="expense-month-filter" class="filter-select" style="min-width:160px;">
                            ${monthOptions}
                        </select>
                        ${expensesState.selectedMonth !== 'all' ? `
                        <div style="display:flex;gap:16px;margin-left:auto;font-size:0.82rem;flex-wrap:wrap;">
                            <span style="color:var(--text-secondary);">Oxi <strong style="color:var(--text-primary);">${formatCLP(filtOxi)}</strong></span>
                            <span style="color:var(--text-secondary);">Javi <strong style="color:var(--text-primary);">${formatCLP(filtJavi)}</strong></span>
                            <span style="font-weight:800;">Total: <strong style="color:var(--accent-primary);">${formatCLP(filtTotal)}</strong></span>
                        </div>` : ''}
                    </div>

                    <div class="expenses-table-wrapper">
                        <table class="expenses-table">
                            <thead><tr><th>Concepto</th><th>Monto</th><th>Pagado por</th><th>Fecha</th><th>Categoría</th><th></th></tr></thead>
                            <tbody>${filtExpenseRows || '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-secondary);">No hay gastos en este período.</td></tr>'}</tbody>
                        </table>
                    </div>
                    ${settlementsHTML}
                </div>
            `;

            loadEconomicIndicators();

            document.getElementById('add-expense-btn')?.addEventListener('click', () => openExpenseModal(null, -1, container));

            document.getElementById('btn-saldar-deuda')?.addEventListener('click', (e) => {
                const btn = e.currentTarget;
                const debtorName   = btn.getAttribute('data-debtor-name');
                const creditorName = btn.getAttribute('data-creditor-name');
                const amount       = parseInt(btn.getAttribute('data-amount'), 10);
                if (confirm(`¿Confirmar liquidación? Se registrará el pago de ${formatCLP(amount)} de ${debtorName} a ${creditorName}.`)) {
                    const d = getBoardData();
                    const unsettled = (d.expenses || []).filter(exp => !exp.settled);
                    if (!d.settlements) d.settlements = [];
                    d.settlements.push({
                        id: generateId(),
                        date: new Date().toISOString().split('T')[0],
                        debtor: debtorName,
                        creditor: creditorName,
                        amount,
                        expenseCount: unsettled.length
                    });
                    unsettled.forEach(exp => { exp.settled = true; });
                    saveBoardData(d);
                    addActivityLog(`${debtorName} pagó ${formatCLP(amount)} a ${creditorName}`, 'Gastos', 'low');
                    renderExpenses(container);
                }
            });

            // Month filter
            document.getElementById('expense-month-filter')?.addEventListener('change', (e) => {
                expensesState.selectedMonth = e.target.value;
                renderExpenses(container);
            });

            container.querySelectorAll('.expense-edit-btn').forEach(btn => {
                btn.addEventListener('click', () => openExpenseModal(expenses[parseInt(btn.getAttribute('data-idx'))], parseInt(btn.getAttribute('data-idx')), container));
            });

            container.querySelectorAll('.expense-delete-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.getAttribute('data-idx'));
                    if (confirm('¿Eliminar este gasto?')) {
                        const d = getBoardData();
                        d.expenses.splice(idx, 1);
                        saveBoardData(d);
                        addActivityLog('Gasto eliminado', 'Gastos', 'low');
                        renderExpenses(container);
                    }
                });
            });
        };

        const loadEconomicIndicators = async () => {
            const CACHE_KEY = 'ratoncitos_indicators';
            const CACHE_TTL = 3600000;
            const panel = document.getElementById('economic-indicators-panel');
            if (!panel) return;
            const renderInds = (d) => {
                const fmt = v => formatCLP(Math.round(v || 0));
                const fecha = d.uf?.fecha ? (() => { try { return new Date(d.uf.fecha).toLocaleDateString('es-CL', { day: 'numeric', month: 'short', year: 'numeric' }); } catch { return ''; } })() : '';
                panel.innerHTML = `
                    <div class="indicator-chip"><span class="ind-label">UF</span><span class="ind-value">${fmt(d.uf?.valor)}</span></div>
                    <div class="indicator-chip"><span class="ind-label">USD</span><span class="ind-value">${fmt(d.dolar?.valor)}</span></div>
                    <div class="indicator-chip"><span class="ind-label">EUR</span><span class="ind-value">${fmt(d.euro?.valor)}</span></div>
                    <div class="indicator-chip"><span class="ind-label">UTM</span><span class="ind-value">${fmt(d.utm?.valor)}</span></div>
                    ${fecha ? `<span style="font-size:0.68rem;color:var(--text-secondary);margin-left:auto;">Al ${fecha}</span>` : ''}
                `;
            };
            try {
                // Invalidate cache if it produced Invalid Date (legacy bug)
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    const { data, ts } = JSON.parse(cached);
                    const testDate = data.uf?.fecha ? new Date(data.uf.fecha) : null;
                    const cacheOk  = testDate && !isNaN(testDate.getTime());
                    if (cacheOk && Date.now() - ts < CACHE_TTL) { renderInds(data); return; }
                }
                const res = await fetch('https://mindicador.cl/api');
                if (!res.ok) throw new Error('fetch error');
                const data = await res.json();
                localStorage.setItem(CACHE_KEY, JSON.stringify({ data, ts: Date.now() }));
                renderInds(data);
            } catch {
                const panel2 = document.getElementById('economic-indicators-panel');
                if (panel2) panel2.innerHTML = '<span class="indicators-loading">Indicadores no disponibles (sin conexión)</span>';
            }
        };

        const openExpenseModal = (existing = null, editIdx = -1, expContainer = null) => {
            document.getElementById('expense-modal-overlay')?.remove();
            const catOptions = EXPENSE_CATEGORIES.map(c => `<option value="${escapeHTML(c)}" ${existing?.category === c ? 'selected' : ''}>${escapeHTML(c)}</option>`).join('');
            const todayStr = new Date().toISOString().split('T')[0];
            const isEdit = existing !== null && editIdx >= 0;
            const overlay = document.createElement('div');
            overlay.className = 'expense-modal-overlay show';
            overlay.id = 'expense-modal-overlay';
            overlay.innerHTML = `
                <div class="expense-modal-card">
                    <div class="expense-modal-header">
                        <h3>${isEdit ? 'Editar Gasto' : 'Nuevo Gasto Compartido'}</h3>
                        <button class="expense-modal-close" id="expense-modal-close" aria-label="Cerrar">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
                        </button>
                    </div>
                    <form id="expense-form" class="expense-form">
                        <div class="form-group">
                            <label for="exp-concept">Concepto</label>
                            <input type="text" id="exp-concept" placeholder="Ej: Compra semanal Jumbo" value="${escapeHTML(existing?.concept || '')}" required>
                        </div>
                        <div class="form-row-2">
                            <div class="form-group">
                                <label for="exp-amount">Monto (CLP $)</label>
                                <input type="text" inputmode="numeric" id="exp-amount" placeholder="0" value="${existing ? Math.round(existing.amount).toLocaleString('es-CL') : ''}" required autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="exp-date">Fecha</label>
                                <input type="date" id="exp-date" value="${existing?.date || todayStr}" required>
                            </div>
                        </div>
                        <div class="form-row-2">
                            <div class="form-group">
                                <label for="exp-paid-by">Pagado por</label>
                                <select id="exp-paid-by" required>
                                    <option value="oxi@oxiflow.com" ${existing?.paidBy === 'oxi@oxiflow.com' ? 'selected' : ''}>Oxi</option>
                                    <option value="javi@oxiflow.com" ${existing?.paidBy === 'javi@oxiflow.com' ? 'selected' : ''}>Javi</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="exp-category">Categoría</label>
                                <select id="exp-category" required>${catOptions}</select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;font-weight:700;font-size:1rem;margin-top:4px;">${isEdit ? 'Guardar Cambios' : 'Guardar Gasto'}</button>
                    </form>
                </div>
            `;
            document.body.appendChild(overlay);
            if (!isEdit) {
                const session = getActiveUserSession();
                if (session?.email) overlay.querySelector('#exp-paid-by').value = session.email;
            }
            const closeOverlay = () => { overlay.classList.remove('show'); setTimeout(() => overlay.remove(), 300); };
            overlay.querySelector('#expense-modal-close').addEventListener('click', closeOverlay);
            overlay.addEventListener('click', e => { if (e.target === overlay) closeOverlay(); });

            // CLP amount formatting
            const amountInput = overlay.querySelector('#exp-amount');
            amountInput.addEventListener('input', () => {
                const digits = amountInput.value.replace(/\D/g, '');
                const num    = parseInt(digits || '0', 10);
                amountInput.value = num > 0 ? num.toLocaleString('es-CL') : '';
            });

            overlay.querySelector('#expense-form').addEventListener('submit', e => {
                e.preventDefault();
                const concept  = overlay.querySelector('#exp-concept').value.trim();
                const rawAmt   = overlay.querySelector('#exp-amount').value.replace(/\./g, '').replace(/[^\d]/g, '');
                const amount   = Math.round(parseInt(rawAmt || '0', 10));
                const date     = overlay.querySelector('#exp-date').value;
                const paidBy   = overlay.querySelector('#exp-paid-by').value;
                const category = overlay.querySelector('#exp-category').value;
                const splitPct = 50;
                if (!concept || amount <= 0) return;
                const d = getBoardData();
                if (!d.expenses) d.expenses = [];
                if (isEdit) {
                    d.expenses[editIdx] = { ...d.expenses[editIdx], concept, amount, date, paidBy, category, splitPct };
                    addActivityLog(`Gasto editado: ${concept}`, 'Gastos', 'low');
                } else {
                    d.expenses.push({ concept, amount, date, paidBy, category, splitPct, id: Date.now().toString(36) });
                    addActivityLog(`Gasto añadido: ${concept} (${formatCLP(amount)})`, 'Gastos', 'medium');
                }
                saveBoardData(d);
                closeOverlay();
                renderExpenses(expContainer || DOM.appContent);
            });
        };

        // --- 4. MAIN ORCHESTRATOR ENTRYPOINT (js/app.js) ---
        const state = {
            currentView: 'dashboard', // default view
            theme: 'dark'            // 'dark' or 'light'
        };

        // DOM Elements Cache
        const DOM = {
            appContent: document.getElementById('app-content'),
            navDashboard: document.getElementById('nav-dashboard'),
            navKanban: document.getElementById('nav-kanban'),
            navCalendar: document.getElementById('nav-calendar'),
            navExpenses: document.getElementById('nav-expenses'),
            themeToggle: document.getElementById('theme-toggle'),
            mobileToggle: document.getElementById('mobile-toggle'),
            sidebar: document.getElementById('sidebar'),
            currentDate: document.getElementById('current-date'),
            searchInput: document.getElementById('search-input'),
            searchContainer: document.getElementById('global-search-container')
        };

        // Theme Management
        const initTheme = () => {
            const savedTheme = localStorage.getItem('oxiflow_theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            state.theme = savedTheme || (prefersDark ? 'dark' : 'light');
            applyTheme();

            DOM.themeToggle.addEventListener('click', () => {
                state.theme = state.theme === 'dark' ? 'light' : 'dark';
                applyTheme();
            });
        };

        const applyTheme = () => {
            const textSpan = DOM.themeToggle.querySelector('.theme-toggle-text');
            
            if (state.theme === 'dark') {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                textSpan.textContent = 'Modo Claro';
                localStorage.setItem('oxiflow_theme', 'dark');
            } else {
                document.body.classList.remove('dark-theme');
                document.body.classList.add('light-theme');
                textSpan.textContent = 'Modo Oscuro';
                localStorage.setItem('oxiflow_theme', 'light');
            }
        };

        // Date Header Badge Helper
        const initDateTime = () => {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const today = new Date();
            let dateStr = today.toLocaleDateString('es-ES', options);
            dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
            DOM.currentDate.textContent = dateStr;
        };

        // Single Page App Router
        const initNavigation = () => {
            const buttons = [DOM.navDashboard, DOM.navKanban, DOM.navCalendar, DOM.navGantt, DOM.navExpenses];
            
            buttons.forEach(btn => {
                if (!btn) return;
                btn.addEventListener('click', (e) => {
                    const button = e.currentTarget;
                    const targetView = button.getAttribute('data-view');
                    
                    if (targetView === state.currentView) return;
                    
                    buttons.forEach(b => b && b.classList.remove('active'));
                    button.classList.add('active');
                    
                    switchView(targetView);
                    
                    DOM.sidebar.classList.remove('mobile-open');
                });
            });
        };

        var switchView = (viewName) => {
            try {
                state.currentView = viewName;
                DOM.searchInput.value = '';
                
                DOM.appContent.style.animation = 'none';
                void DOM.appContent.offsetWidth; 
                DOM.appContent.style.animation = 'fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards';
                
                if (viewName === 'dashboard') {
                    DOM.searchContainer.classList.add('hidden');
                    renderDashboard(DOM.appContent);
                } else if (viewName === 'kanban') {
                    DOM.searchContainer.classList.remove('hidden');
                    renderKanban(DOM.appContent);
                } else if (viewName === 'calendar') {
                    DOM.searchContainer.classList.add('hidden');
                    renderCalendar(DOM.appContent);
                } else if (viewName === 'expenses') {
                    DOM.searchContainer.classList.add('hidden');
                    renderExpenses(DOM.appContent);
                }
            } catch (err) {
                console.error("Fallo en switchView:", err);
                if (window.showAppError) {
                    window.showAppError(err.message, err.stack || err.toString());
                }
            }
        };

        // Mobile responsive drawer toggle
        const initMobileMenu = () => {
            DOM.mobileToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                DOM.sidebar.classList.toggle('mobile-open');
            });
            
            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 768 && 
                    DOM.sidebar.classList.contains('mobile-open') && 
                    !DOM.sidebar.contains(e.target) && 
                    !DOM.mobileToggle.contains(e.target)) {
                    DOM.sidebar.classList.remove('mobile-open');
                }
            });
        };

        // Global search handling
        const initSearch = () => {
            DOM.searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                if (state.currentView === 'kanban') {
                    handleKanbanSearch(query);
                }
            });
        };

        // Direct Login — Oxi & Javi profile card selector
        const initDirectLogin = () => {
            const loginOverlay = document.getElementById('login-overlay');
            const logoutBtn    = document.getElementById('logout-btn');
            const loginThemeToggle = document.getElementById('login-theme-toggle');
            const profileCards = document.querySelectorAll('.login-profile-card');

            // Login screen theme toggle — mirrors the sidebar toggle
            if (loginThemeToggle) {
                const syncLoginToggleIcon = () => {
                    const lightIcon = loginThemeToggle.querySelector('.icon-light');
                    const darkIcon  = loginThemeToggle.querySelector('.icon-dark');
                    if (lightIcon) lightIcon.style.display = state.theme === 'dark'  ? 'flex' : 'none';
                    if (darkIcon)  darkIcon.style.display  = state.theme === 'light' ? 'flex' : 'none';
                };
                syncLoginToggleIcon();
                loginThemeToggle.addEventListener('click', () => {
                    state.theme = state.theme === 'dark' ? 'light' : 'dark';
                    applyTheme();
                    syncLoginToggleIcon();
                });
            }

            const updateUserProfileUI = (user) => {
                const avatarEl = document.querySelector('.sidebar .user-profile .avatar');
                const nameEl   = document.querySelector('.sidebar .user-profile .user-name');
                const roleEl   = document.querySelector('.sidebar .user-profile .user-role');
                if (avatarEl && nameEl && roleEl) {
                    if (user) {
                        const isOxi = user.email === 'oxi@oxiflow.com';
                        // Show mini mouse SVG matching login screen
                        avatarEl.style.background = 'transparent';
                        avatarEl.style.color = '';
                        avatarEl.style.fontWeight = '';
                        avatarEl.style.display = 'flex';
                        avatarEl.style.alignItems = 'center';
                        avatarEl.style.justifyContent = 'center';
                        if (isOxi) {
                            avatarEl.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36" fill="none">
                                <circle cx="10" cy="10" r="6" fill="#6366f1" opacity="0.85"/>
                                <circle cx="10" cy="10" r="3.5" fill="#a5b4fc"/>
                                <circle cx="26" cy="10" r="6" fill="#6366f1" opacity="0.85"/>
                                <circle cx="26" cy="10" r="3.5" fill="#a5b4fc"/>
                                <ellipse cx="18" cy="24" rx="11" ry="9" fill="#6366f1"/>
                                <circle cx="14" cy="22" r="2" fill="white"/>
                                <circle cx="22" cy="22" r="2" fill="white"/>
                                <circle cx="14.5" cy="22" r="1" fill="#1e1b4b"/>
                                <circle cx="22.5" cy="22" r="1" fill="#1e1b4b"/>
                                <ellipse cx="18" cy="26" rx="2" ry="1.5" fill="#fda4af"/>
                            </svg>`;
                        } else {
                            avatarEl.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36" fill="none">
                                <circle cx="10" cy="10" r="6" fill="#ec4899" opacity="0.85"/>
                                <circle cx="10" cy="10" r="3.5" fill="#f9a8d4"/>
                                <circle cx="26" cy="10" r="6" fill="#ec4899" opacity="0.85"/>
                                <circle cx="26" cy="10" r="3.5" fill="#f9a8d4"/>
                                <ellipse cx="18" cy="24" rx="11" ry="9" fill="#ec4899"/>
                                <circle cx="14" cy="22" r="2" fill="white"/>
                                <circle cx="22" cy="22" r="2" fill="white"/>
                                <circle cx="14.5" cy="22" r="1" fill="#4a044e"/>
                                <circle cx="22.5" cy="22" r="1" fill="#4a044e"/>
                                <ellipse cx="18" cy="26" rx="2" ry="1.5" fill="#fda4af"/>
                            </svg>`;
                        }
                        nameEl.textContent = user.name;
                        roleEl.textContent = user.name === 'Oxi' ? 'Administrador' : 'Administradora';
                    } else {
                        avatarEl.innerHTML = '';
                        avatarEl.textContent = '?';
                        avatarEl.style.background = 'var(--glass-bg)';
                        avatarEl.style.color = 'var(--text-secondary)';
                        nameEl.textContent = 'Sin sesión';
                        roleEl.textContent = 'Selecciona tu perfil';
                    }
                }
            };

            const session = getActiveUserSession();
            if (session) {
                loginOverlay.classList.add('hidden');
                updateUserProfileUI(session);
                switchView(state.currentView);
            } else {
                loginOverlay.classList.remove('hidden');
            }

            profileCards.forEach(card => {
                card.addEventListener('click', () => {
                    const pwdInput = document.getElementById('login-password-input');
                    const errorMsg = document.getElementById('login-error-msg');
                    if (pwdInput && pwdInput.value !== 'onepiece') {
                        errorMsg.style.display = 'block';
                        return;
                    }
                    if (errorMsg) errorMsg.style.display = 'none';

                    const name  = card.getAttribute('data-name');
                    const email = card.getAttribute('data-email');
                    const user  = { name, email, picture: 'icon.svg' };
                    localStorage.setItem('oxiflow_user_session', JSON.stringify(user));
                    loginOverlay.classList.add('hidden');
                    updateUserProfileUI(user);
                    state.currentView = 'dashboard';
                    switchView(state.currentView);
                    addActivityLog(`${name} ha iniciado sesión`, 'Tablero', 'low');
                });
            });

            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm('¿Cerrar sesión en Ratoncitos?')) {
                        const s = getActiveUserSession();
                        addActivityLog(`${s ? s.name : 'Usuario'} cerró sesión`, 'Tablero', 'low');
                        localStorage.removeItem('oxiflow_user_session');
                        updateUserProfileUI(null);
                        loginOverlay.classList.remove('hidden');
                        DOM.sidebar.classList.remove('mobile-open');
                    }
                });
            }
        };


        // Initialize Application
        const init = () => {
            try {
                initModalCache();
                initTheme();
                initDateTime();
                initNavigation();
                initMobileMenu();
                initSearch();
                initDirectLogin();   // Session & authentication flow
            } catch (err) {
                console.error("Fallo en inicialización de Ratoncitos:", err);
                if (window.showAppError) {
                    window.showAppError(err.message, err.stack || err.toString());
                }
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>

    <!-- Direct Login — Profile Selector for Oxi & Javi -->
    <div class="login-overlay" id="login-overlay">
        <!-- Theme toggle inside login -->
        <button class="login-theme-toggle" id="login-theme-toggle" aria-label="Cambiar tema">
            <span class="icon-light">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            </span>
            <span class="icon-dark">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            </span>
        </button>

        <div class="login-card">
            <div class="login-logo">
                <!-- Two mice SVG -->
                <svg xmlns="http://www.w3.org/2000/svg" width="96" height="60" viewBox="0 0 96 60" fill="none">
                    <!-- Mouse Oxi (left, blue) -->
                    <g>
                        <circle cx="11" cy="14" r="7" fill="#6366f1" opacity="0.85"/>
                        <circle cx="11" cy="14" r="4" fill="#a5b4fc"/>
                        <circle cx="27" cy="14" r="7" fill="#6366f1" opacity="0.85"/>
                        <circle cx="27" cy="14" r="4" fill="#a5b4fc"/>
