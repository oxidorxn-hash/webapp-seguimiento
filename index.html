                        const dateInput = document.getElementById('task-date-input');
                        if (dateInput) dateInput.value = dateStr;
                        
                        const form = document.getElementById('task-form');
                        const refreshTimeline = () => {
                            setTimeout(() => {
                                if (state.currentView === 'gantt') {
                                    renderGantt(DOM.appContent);
                                }
                                form.removeEventListener('submit', refreshTimeline);
                            }, 50);
                        };
                        form.addEventListener('submit', refreshTimeline);
                    }
                };
            });
        };

        // --- 3.5 EXPENSES MODULE ---
        const EXPENSE_CATEGORIES = ['Supermercado', 'Casa', 'Mascotas', 'Finanzas', 'Ocio', 'Transporte', 'Salud', 'Otro'];
        
        const getCategoryColor = (cat) => {
            const map = {
                'Casa': '#a855f7', 'Supermercado': '#22c55e', 'Mascotas': '#f59e0b',
                'Finanzas': '#3b82f6', 'Trabajo': '#6366f1', 'Ocio': '#ec4899',
                'Transporte': '#14b8a6', 'Salud': '#ef4444', 'Otro': '#94a3b8'
            };
            return map[cat] || '#94a3b8';
        };

        var renderExpenses = (container) => {
            const data = getBoardData();
            const expenses = data.expenses || [];
            
            // Calculate balances
            const totals = { 'oxi@oxiflow.com': 0, 'javi@oxiflow.com': 0 };
            let grandTotal = 0;
            expenses.forEach(exp => {
                const amt = parseFloat(exp.amount) || 0;
                if (totals[exp.paidBy] !== undefined) totals[exp.paidBy] += amt;
                grandTotal += amt;
            });

            const oxiTotal = totals['oxi@oxiflow.com'];
            const javiTotal = totals['javi@oxiflow.com'];
            const fairShare = grandTotal / 2;
            const oxiBalance = oxiTotal - fairShare;
            const javiBalance = javiTotal - fairShare;

            let settlementHTML = '';
            if (Math.abs(oxiBalance) < 0.01) {
                settlementHTML = `<div class="settlement-card settled"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg><span>¡Cuentas perfectamente saldadas! 🎉</span></div>`;
            } else if (oxiBalance > 0) {
                settlementHTML = `<div class="settlement-card owes"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg><span><strong>Javi</strong> le debe <strong>$${Math.abs(oxiBalance).toFixed(2)}</strong> a <strong>Oxi</strong></span></div>`;
            } else {
                settlementHTML = `<div class="settlement-card owes"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg><span><strong>Oxi</strong> le debe <strong>$${Math.abs(javiBalance).toFixed(2)}</strong> a <strong>Javi</strong></span></div>`;
            }

            const expenseRows = expenses.map((exp, idx) => {
                const isOxi = exp.paidBy === 'oxi@oxiflow.com';
                const paidByName = isOxi ? 'Oxi' : 'Javi';
                const avatarClass = isOxi ? 'avatar-oxi' : 'avatar-javi';
                const initial = isOxi ? 'O' : 'J';
                const catColor = getCategoryColor(exp.category);
                const dateStr = exp.date ? new Date(exp.date + 'T12:00:00').toLocaleDateString('es-ES', { day: 'numeric', month: 'short' }) : '—';
                
                return `
                    <tr class="expense-row" style="animation: fadeIn 0.3s ease ${idx * 0.05}s both;">
                        <td class="expense-concept">${exp.concept || 'Sin concepto'}</td>
                        <td class="expense-amount">$${(parseFloat(exp.amount) || 0).toFixed(2)}</td>
                        <td>
                            <div class="expense-paid-by">
                                <div class="expense-avatar ${avatarClass}">${initial}</div>
                                <span>${paidByName}</span>
                            </div>
                        </td>
                        <td>${dateStr}</td>
                        <td><span class="expense-cat-tag" style="--cat-color: ${catColor};">${exp.category || 'Otro'}</span></td>
                        <td>
                            <button class="expense-delete-btn" data-idx="${idx}" title="Eliminar gasto" aria-label="Eliminar gasto">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                            </button>
                        </td>
                    </tr>`;
            }).join('');

            container.innerHTML = `
                <div class="expenses-container">
                    <div class="expenses-header">
                        <div>
                            <h1 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 4px;">💰 Control de Gastos</h1>
                            <p style="color: var(--text-secondary); font-size: 0.95rem;">Gestión y liquidación de gastos compartidos en el hogar.</p>
                        </div>
                        <button class="btn btn-primary" id="add-expense-btn" style="padding: 10px 20px; border-radius: var(--border-radius-md); font-weight: 600; display: flex; align-items: center; gap: 8px;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"></line><line x1="5" x2="19" y1="12" y2="12"></line></svg>
                            Añadir Gasto
                        </button>
                    </div>

                    <div class="expenses-balance-grid">
                        <div class="balance-card balance-oxi">
                            <div class="balance-avatar avatar-oxi">O</div>
                            <div class="balance-info">
                                <span class="balance-name">Oxi</span>
                                <span class="balance-amount">$${oxiTotal.toFixed(2)}</span>
                            </div>
                            <div class="balance-label">Aportado</div>
                        </div>
                        <div class="balance-card balance-javi">
                            <div class="balance-avatar avatar-javi">J</div>
                            <div class="balance-info">
                                <span class="balance-name">Javi</span>
                                <span class="balance-amount">$${javiTotal.toFixed(2)}</span>
                            </div>
                            <div class="balance-label">Aportado</div>
                        </div>
                        <div class="balance-card balance-total">
                            <div class="balance-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"></rect><line x1="2" x2="22" y1="10" y2="10"></line></svg>
                            </div>
                            <div class="balance-info">
                                <span class="balance-name">Total Gastos</span>
                                <span class="balance-amount">$${grandTotal.toFixed(2)}</span>
                            </div>
                            <div class="balance-label">Compartido</div>
                        </div>
                    </div>

                    ${settlementHTML}

                    <div class="expenses-table-wrapper">
                        <table class="expenses-table">
                            <thead>
                                <tr>
                                    <th>Concepto</th>
                                    <th>Monto</th>
                                    <th>Pagado por</th>
                                    <th>Fecha</th>
                                    <th>Categoría</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                ${expenseRows || '<tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-secondary);">No hay gastos registrados aún. ¡Añade tu primer gasto!</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            // Bind add expense button
            document.getElementById('add-expense-btn')?.addEventListener('click', () => {
                openExpenseModal();
            });

            // Bind delete buttons
            container.querySelectorAll('.expense-delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.getAttribute('data-idx'));
                    if (confirm('¿Eliminar este gasto?')) {
                        const d = getBoardData();
                        d.expenses.splice(idx, 1);
                        saveBoardData(d);
                        renderExpenses(container);
                        addActivityLog('Gasto eliminado', 'Gastos', 'low');
                    }
                });
            });
        };

        const openExpenseModal = () => {
            // Remove any existing modal
            document.getElementById('expense-modal-overlay')?.remove();

            const catOptions = EXPENSE_CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');
            const todayStr = new Date().toISOString().split('T')[0];

            const overlay = document.createElement('div');
            overlay.className = 'expense-modal-overlay show';
            overlay.id = 'expense-modal-overlay';
            overlay.innerHTML = `
                <div class="expense-modal-card">
                    <div class="expense-modal-header">
                        <h3>Nuevo Gasto Compartido</h3>
                        <button class="expense-modal-close" id="expense-modal-close" aria-label="Cerrar">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="6" y1="6" y2="18"></line><line x1="6" x2="18" y1="6" y2="18"></line></svg>
                        </button>
                    </div>
                    <form id="expense-form" class="expense-form">
                        <div class="form-group">
                            <label for="expense-concept">Concepto</label>
                            <input type="text" id="expense-concept" placeholder="Ej: Compra semanal Jumbo" required>
                        </div>
                        <div class="form-row-2">
                            <div class="form-group">
                                <label for="expense-amount">Monto ($)</label>
                                <input type="number" id="expense-amount" placeholder="0.00" step="0.01" min="0.01" required>
                            </div>
                            <div class="form-group">
                                <label for="expense-date">Fecha</label>
                                <input type="date" id="expense-date" value="${todayStr}" required>
                            </div>
                        </div>
                        <div class="form-row-2">
                            <div class="form-group">
                                <label for="expense-paid-by">Pagado por</label>
                                <select id="expense-paid-by" required>
                                    <option value="oxi@oxiflow.com">Oxi</option>
                                    <option value="javi@oxiflow.com">Javi</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="expense-category">Categoría</label>
                                <select id="expense-category" required>
                                    ${catOptions}
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-weight: 700; font-size: 1rem; margin-top: 8px;">
                            Guardar Gasto
                        </button>
                    </form>
                </div>
            `;

            document.body.appendChild(overlay);

            // Auto-select current user
            const session = getActiveUserSession();
            if (session && session.email) {
                const sel = overlay.querySelector('#expense-paid-by');
                if (sel) sel.value = session.email;
            }

            // Close button
            overlay.querySelector('#expense-modal-close').addEventListener('click', () => {
                overlay.classList.remove('show');
                setTimeout(() => overlay.remove(), 300);
            });

            // Click backdrop to close
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('show');
                    setTimeout(() => overlay.remove(), 300);
                }
            });

            // Form submit
            overlay.querySelector('#expense-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const concept = document.getElementById('expense-concept').value.trim();
                const amount = parseFloat(document.getElementById('expense-amount').value);
                const date = document.getElementById('expense-date').value;
                const paidBy = document.getElementById('expense-paid-by').value;
                const category = document.getElementById('expense-category').value;

                if (!concept || !amount || amount <= 0) return;

                const d = getBoardData();
                if (!d.expenses) d.expenses = [];
                d.expenses.push({ concept, amount, date, paidBy, category, id: Date.now().toString(36) });
                saveBoardData(d);

                overlay.classList.remove('show');
                setTimeout(() => overlay.remove(), 300);

                renderExpenses(DOM.appContent);
                addActivityLog(`Gasto añadido: ${concept} ($${amount.toFixed(2)})`, 'Gastos', 'medium');
            });
        };

        // --- 4. MAIN ORCHESTRATOR ENTRYPOINT (js/app.js) ---
        const state = {
            currentView: 'dashboard', // default view
            theme: 'dark'            // 'dark' or 'light'
        };

        // DOM Elements Cache
        const DOM = {
            appContent: document.getElementById('app-content'),
            navDashboard: document.getElementById('nav-dashboard'),
            navKanban: document.getElementById('nav-kanban'),
            navCalendar: document.getElementById('nav-calendar'),
            navGantt: document.getElementById('nav-gantt'),
            navExpenses: document.getElementById('nav-expenses'),
            themeToggle: document.getElementById('theme-toggle'),
            mobileToggle: document.getElementById('mobile-toggle'),
            sidebar: document.getElementById('sidebar'),
            currentDate: document.getElementById('current-date'),
            searchInput: document.getElementById('search-input'),
            searchContainer: document.getElementById('global-search-container')
        };

        // Theme Management
        const initTheme = () => {
            const savedTheme = localStorage.getItem('oxiflow_theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            state.theme = savedTheme || (prefersDark ? 'dark' : 'light');
            applyTheme();

            DOM.themeToggle.addEventListener('click', () => {
                state.theme = state.theme === 'dark' ? 'light' : 'dark';
                applyTheme();
            });
        };

        const applyTheme = () => {
            const textSpan = DOM.themeToggle.querySelector('.theme-toggle-text');
            
            if (state.theme === 'dark') {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                textSpan.textContent = 'Modo Claro';
                localStorage.setItem('oxiflow_theme', 'dark');
            } else {
                document.body.classList.remove('dark-theme');
                document.body.classList.add('light-theme');
                textSpan.textContent = 'Modo Oscuro';
                localStorage.setItem('oxiflow_theme', 'light');
            }
        };

        // Date Header Badge Helper
        const initDateTime = () => {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const today = new Date();
            let dateStr = today.toLocaleDateString('es-ES', options);
            dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
            DOM.currentDate.textContent = dateStr;
        };

        // Single Page App Router
        const initNavigation = () => {
            const buttons = [DOM.navDashboard, DOM.navKanban, DOM.navCalendar, DOM.navGantt, DOM.navExpenses];
            
            buttons.forEach(btn => {
                if (!btn) return;
                btn.addEventListener('click', (e) => {
                    const button = e.currentTarget;
                    const targetView = button.getAttribute('data-view');
                    
                    if (targetView === state.currentView) return;
                    
                    buttons.forEach(b => b && b.classList.remove('active'));
                    button.classList.add('active');
                    
                    switchView(targetView);
                    
                    DOM.sidebar.classList.remove('mobile-open');
                });
            });
        };

        var switchView = (viewName) => {
            try {
                state.currentView = viewName;
                DOM.searchInput.value = '';
                
                DOM.appContent.style.animation = 'none';
                void DOM.appContent.offsetWidth; 
                DOM.appContent.style.animation = 'fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards';
                
                if (viewName === 'dashboard') {
                    DOM.searchContainer.classList.add('hidden');
                    renderDashboard(DOM.appContent);
                } else if (viewName === 'kanban') {
                    DOM.searchContainer.classList.remove('hidden');
                    renderKanban(DOM.appContent);
                } else if (viewName === 'calendar') {
                    DOM.searchContainer.classList.add('hidden');
                    renderCalendar(DOM.appContent);
                } else if (viewName === 'gantt') {
                    DOM.searchContainer.classList.add('hidden');
                    renderGantt(DOM.appContent);
                } else if (viewName === 'expenses') {
                    DOM.searchContainer.classList.add('hidden');
                    renderExpenses(DOM.appContent);
                }
            } catch (err) {
                console.error("Fallo en switchView:", err);
                if (window.showAppError) {
                    window.showAppError(err.message, err.stack || err.toString());
                }
            }
        };

        // Mobile responsive drawer toggle
        const initMobileMenu = () => {
            DOM.mobileToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                DOM.sidebar.classList.toggle('mobile-open');
            });
            
            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 768 && 
                    DOM.sidebar.classList.contains('mobile-open') && 
                    !DOM.sidebar.contains(e.target) && 
                    !DOM.mobileToggle.contains(e.target)) {
                    DOM.sidebar.classList.remove('mobile-open');
                }
            });
        };

        // Global search handling
        const initSearch = () => {
            DOM.searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                if (state.currentView === 'kanban') {
                    handleKanbanSearch(query);
                }
            });
        };

        // Direct Login — Oxi & Javi profile card selector
        const initDirectLogin = () => {
            const loginOverlay = document.getElementById('login-overlay');
            const logoutBtn = document.getElementById('logout-btn');
            const profileCards = document.querySelectorAll('.login-profile-card');

            const updateUserProfileUI = (user) => {
                const avatarEl = document.querySelector('.sidebar .user-profile .avatar');
                const nameEl = document.querySelector('.sidebar .user-profile .user-name');
                const roleEl = document.querySelector('.sidebar .user-profile .user-role');
                
                if (avatarEl && nameEl && roleEl) {
                    if (user) {
                        const isOxi = user.email === 'oxi@oxiflow.com';
                        const gradient = isOxi ? 'linear-gradient(135deg, #6366f1, #3b82f6)' : 'linear-gradient(135deg, #ec4899, #a855f7)';
                        const initial = isOxi ? 'O' : 'J';
                        avatarEl.innerHTML = '';
                        avatarEl.textContent = initial;
                        avatarEl.style.background = gradient;
                        avatarEl.style.color = 'white';
                        avatarEl.style.fontWeight = '800';
                        avatarEl.style.display = 'flex';
                        avatarEl.style.alignItems = 'center';
                        avatarEl.style.justifyContent = 'center';
                        nameEl.textContent = user.name;
                        roleEl.textContent = user.email;
                    } else {
                        avatarEl.innerHTML = 'U';
                        avatarEl.style.background = '';
                        avatarEl.style.color = '';
                        nameEl.textContent = 'Sin sesión';
                        roleEl.textContent = 'Selecciona tu perfil';
                    }
                }
            };

            const session = getActiveUserSession();
            if (session) {
                loginOverlay.classList.add('hidden');
                updateUserProfileUI(session);
                switchView(state.currentView);
            } else {
                loginOverlay.classList.remove('hidden');
            }

            profileCards.forEach(card => {
                card.addEventListener('click', () => {
                    const name = card.getAttribute('data-name');
                    const email = card.getAttribute('data-email');
                    
                    const user = { name, email, picture: 'icon.svg' };
                    localStorage.setItem('oxiflow_user_session', JSON.stringify(user));
                    
                    loginOverlay.classList.add('hidden');
                    updateUserProfileUI(user);
                    
                    state.currentView = 'dashboard';
                    switchView(state.currentView);
                    addActivityLog(`${name} ha iniciado sesión`, 'Tablero', 'low');
                });
            });

            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm('¿Estás seguro de que deseas cerrar tu sesión en Oxiflow Kanban?')) {
                        const session = getActiveUserSession();
                        const name = session ? session.name : 'Usuario';
                        addActivityLog(`${name} cerró sesión`, 'Tablero', 'low');
                        localStorage.removeItem('oxiflow_user_session');
                        updateUserProfileUI(null);
                        loginOverlay.classList.remove('hidden');
                        DOM.sidebar.classList.remove('mobile-open');
                    }
                });
            }
        };


        // Initialize Application
        const init = () => {
            try {
                initModalCache();
                initTheme();
                initDateTime();
                initNavigation();
                initMobileMenu();
                initSearch();
                initDirectLogin();   // Session & authentication flow
            } catch (err) {
                console.error("Fallo en inicialización de Oxiflow Kanban:", err);
                if (window.showAppError) {
                    window.showAppError(err.message, err.stack || err.toString());
                }
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>

    <!-- Direct Login — Profile Selector for Oxi & Javi -->
    <div class="login-overlay" id="login-overlay">
        <div class="login-card">
            <div class="login-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><path d="m12 14-3-3 3-3"></path><path d="m16 11-4 3"></path></svg>
            </div>
            <h2 class="login-title">Oxiflow Kanban</h2>
            <p class="login-subtitle">Gestión de tareas y gastos en el hogar.<br>¿Quién ingresa hoy?</p>
            
            <div class="login-profiles-grid">
                <div class="login-profile-card oxi" data-name="Oxi" data-email="oxi@oxiflow.com">
                    <div class="login-profile-avatar">O</div>
                    <span class="login-profile-name">Oxi</span>
                    <span class="login-profile-email">oxi@oxiflow.com</span>
                </div>
                <div class="login-profile-card javi" data-name="Javi" data-email="javi@oxiflow.com">
                    <div class="login-profile-avatar">J</div>
                    <span class="login-profile-name">Javi</span>
                    <span class="login-profile-email">javi@oxiflow.com</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
